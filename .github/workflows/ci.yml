name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 0: Static Analysis ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run luacheck
        run: luacheck .

  # ── Stage 1: Unit Tests (native Lua 5.2) ──────────────────────────────
  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run unit tests
        run: |
          bash .github/scripts/run-tests.sh "Unit Tests" \
            tests/unit/lane_state_test.lua \
            tests/unit/lock_manager_test.lua \
            tests/unit/job_descriptor_test.lua \
            tests/unit/buffer_monitor_test.lua \
            tests/unit/job_assigner_test.lua \
            tests/unit/job_reaper_test.lua \
            tests/unit/watchdog_test.lua \
            tests/unit/completion_detector_test.lua \
            tests/unit/circuit_manager_test.lua \
            tests/unit/network_protocols_test.lua \
            tests/unit/machine_selector_test.lua \
            tests/unit/fault_net_test.lua \
            tests/unit/admission_control_test.lua
      - name: Run existing test suite
        run: |
          bash .github/scripts/run-tests.sh "Existing Tests" \
            tests/coroutine_scheduler_test.lua \
            tests/fluid_tanks_test.lua \
            tests/descriptor_cache_test.lua

  # ── Stage 2: Lua Integration Tests ────────────────────────────────────
  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run integration tests
        run: |
          bash .github/scripts/run-tests.sh "Integration Tests" \
            tests/integration/hardware_contract_test.lua \
            tests/integration/adapter_connectivity_test.lua \
            tests/integration/full_lane_stack_test.lua \
            tests/integration/dispatch_pipeline_test.lua \
            tests/integration/network_card_test.lua \
            tests/integration/oc_boot_smoke_test.lua

  # ── Stage 3: Soak Testing ────────────────────────────────────────────
  soak-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run soak tests
        run: |
          bash .github/scripts/run-tests.sh "Soak Tests" \
            tests/soak/soak_thousands_test.lua \
            tests/soak/soak_stuck_phase5_test.lua \
            tests/soak/soak_queue_saturation_test.lua \
            tests/soak/soak_circuit_leak_test.lua
      - name: Upload soak reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-reports
          path: tests/soak/reports/
          retention-days: 30

  # ── Stage 4: Profiling (native Lua 5.2) ───────────────────────────────
  profile:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run profiling
        run: |
          bash .github/scripts/run-tests.sh "Profile Tests" \
            tests/profile/profile_dispatch_test.lua \
            tests/profile/profile_serialization_test.lua \
            tests/profile/profile_retry_test.lua
      - name: Upload profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-reports
          path: tests/profile/reports/
          retention-days: 30

  # ── Stage 5: Release Packaging ───────────────────────────────────────
  release:
    needs: [integration-tests, soak-tests, profile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Create release artifacts
        run: |
          mkdir -p release
          cp -r subnet_broker release/
          cp -r orchestrator release/
          cp -r shared release/
          echo "Release package ready: $(find release -name '*.lua' | wc -l) .lua files"
      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: autos-release
          path: release/
          retention-days: 90
