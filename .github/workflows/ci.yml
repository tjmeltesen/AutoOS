name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 0: Static Analysis ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Install luacheck
        run: sudo luarocks install luacheck
      - name: Run luacheck
        run: luacheck .

  # ── Stage 1: Unit Tests ──────────────────────────────────────────────
  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lupa
        run: pip install lupa
      - name: Run unit tests
        run: python .claude/skills/run-autoos/driver.py --unit
      - name: Run existing test suite
        run: python .claude/skills/run-autoos/driver.py

  # ── Stage 2b: Lua Integration Tests ──────────────────────────────────
  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lupa
        run: pip install lupa
      - name: Run integration tests
        run: python .claude/skills/run-autoos/driver.py --integration

  # ── Stage 3: Soak Testing ────────────────────────────────────────────
  soak-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lupa
        run: pip install lupa
      - name: Run soak tests
        run: python .claude/skills/run-autoos/driver.py --soak
      - name: Upload soak reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-reports
          path: tests/soak/reports/
          retention-days: 30

  # ── Stage 4: Profiling ───────────────────────────────────────────────
  profile:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lupa
        run: pip install lupa
      - name: Run profiling
        run: python .claude/skills/run-autoos/driver.py --profile
      - name: Upload profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-reports
          path: tests/profile/reports/
          retention-days: 30

  # ── Stage 5: Release Packaging ───────────────────────────────────────
  release:
    needs: [integration-tests, soak-tests, profile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Create release artifacts
        run: python .claude/skills/run-autoos/driver.py --release
      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: autos-release
          path: release/
          retention-days: 90
      - name: Upload release checksums
        uses: actions/upload-artifact@v4
        with:
          name: autos-checksums
          path: release/*.sha256
          retention-days: 90

  # ── Stage 6: Deploy to Game Directory ──────────────────────────────────
  # Requires a self-hosted runner on the game machine.
  # Setup: https://github.com/<owner>/<repo>/settings/actions/runners/new
  # Runner labels: autos-deploy, windows
  deploy:
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, autos-deploy]
    timeout-minutes: 5
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: autos-release
          path: ${{ runner.temp }}/autos-release

      - name: Deploy to PrismLauncher game directory
        shell: powershell
        run: |
          $GameHome = "$env:APPDATA\PrismLauncher\instances\GT_New_Horizons_2.8.4_Java_17-25\.minecraft\saves\AutoOS\opencomputers\0f6fe1af-265f-4dcf-be91-d707dc877e0d\home"
          $ArtifactDir = "${{ runner.temp }}\autos-release"

          # Map ZIP contents back to game directories
          $BrokerDest = "$GameHome\subnet_broker"
          $OrchDest   = "$GameHome\orchestrator"

          New-Item -ItemType Directory -Force -Path $BrokerDest | Out-Null
          New-Item -ItemType Directory -Force -Path $OrchDest | Out-Null

          # Copy from extracted artifact
          Get-ChildItem -Recurse -File -Path $ArtifactDir -Filter "*.lua" | ForEach-Object {
            $rel = $_.FullName.Replace($ArtifactDir, "").TrimStart("\")
            if ($rel -match "subnet_broker\\") {
              Copy-Item $_.FullName -Destination $BrokerDest -Force
            }
            elseif ($rel -match "orchestrator\\") {
              Copy-Item $_.FullName -Destination $OrchDest -Force
            }
            elseif ($rel -match "shared\\") {
              Copy-Item $_.FullName -Destination $BrokerDest -Force
              Copy-Item $_.FullName -Destination $OrchDest -Force
            }
          }

          Write-Host "Deployed to $GameHome"
          Get-ChildItem -Recurse -File "$GameHome\*.lua" | Measure-Object | ForEach-Object {
            Write-Host "  $($_.Count) .lua files in game directory"
          }
