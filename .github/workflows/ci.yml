name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 0: Static Analysis ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run luacheck
        run: luacheck .

  # ── Stage 1: Unit Tests (native Lua 5.2) ──────────────────────────────
  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run unit tests
        run: |
          bash .github/scripts/run-tests.sh "Unit Tests" \
            tests/unit/lane_state_test.lua \
            tests/unit/lock_manager_test.lua \
            tests/unit/job_descriptor_test.lua \
            tests/unit/buffer_monitor_test.lua \
            tests/unit/job_assigner_test.lua \
            tests/unit/job_reaper_test.lua \
            tests/unit/watchdog_test.lua \
            tests/unit/completion_detector_test.lua \
            tests/unit/circuit_manager_test.lua \
            tests/unit/network_protocols_test.lua
      - name: Run existing test suite
        run: |
          bash .github/scripts/run-tests.sh "Existing Tests" \
            tests/coroutine_scheduler_test.lua \
            tests/fluid_tanks_test.lua \
            tests/descriptor_cache_test.lua

  # ── Stage 2: Lua Integration Tests ────────────────────────────────────
  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run integration tests
        run: |
          bash .github/scripts/run-tests.sh "Integration Tests" \
            tests/integration/hardware_contract_test.lua \
            tests/integration/adapter_connectivity_test.lua \
            tests/integration/full_lane_stack_test.lua \
            tests/integration/network_card_test.lua \
            tests/integration/oc_boot_smoke_test.lua

  # ── Stage 3: Soak Testing ────────────────────────────────────────────
  soak-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run soak tests
        run: |
          bash .github/scripts/run-tests.sh "Soak Tests" \
            tests/soak/soak_thousands_test.lua \
            tests/soak/soak_stuck_phase5_test.lua \
            tests/soak/soak_queue_saturation_test.lua \
            tests/soak/soak_circuit_leak_test.lua
      - name: Upload soak reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-reports
          path: tests/soak/reports/
          retention-days: 30

  # ── Stage 4: Profiling (native Lua 5.2) ───────────────────────────────
  profile:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-lua
      - name: Run profiling
        run: |
          bash .github/scripts/run-tests.sh "Profile Tests" \
            tests/profile/profile_dispatch_test.lua \
            tests/profile/profile_serialization_test.lua \
            tests/profile/profile_retry_test.lua
      - name: Upload profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-reports
          path: tests/profile/reports/
          retention-days: 30

  # ── Stage 5: Release Packaging ───────────────────────────────────────
  release:
    needs: [integration-tests, soak-tests, profile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create release artifacts
        run: python .claude/skills/run-autoos/driver.py --release
      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: autos-release
          path: release/
          retention-days: 90

  # ── Stage 6: Deploy to Game Directory (self-hosted runner) ───────────
  deploy:
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, autos-deploy]
    timeout-minutes: 5
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: autos-release
          path: ${{ runner.temp }}/autos-release

      - name: Deploy to PrismLauncher game directory
        shell: powershell
        run: |
          $GameHome = "$env:APPDATA\PrismLauncher\instances\GT_New_Horizons_2.8.4_Java_17-25\.minecraft\saves\AutoOS\opencomputers\0f6fe1af-265f-4dcf-be91-d707dc877e0d\home"
          $ArtifactDir = "${{ runner.temp }}\autos-release"
          $BrokerDest = "$GameHome\subnet_broker"
          $OrchDest   = "$GameHome\orchestrator"
          New-Item -ItemType Directory -Force -Path $BrokerDest | Out-Null
          New-Item -ItemType Directory -Force -Path $OrchDest | Out-Null
          Get-ChildItem -Recurse -File -Path $ArtifactDir -Filter "*.lua" | ForEach-Object {
            $rel = $_.FullName.Replace($ArtifactDir, "").TrimStart("\")
            if ($rel -match "subnet_broker\\") { Copy-Item $_.FullName -Destination $BrokerDest -Force }
            elseif ($rel -match "orchestrator\\") { Copy-Item $_.FullName -Destination $OrchDest -Force }
            elseif ($rel -match "shared\\") {
              Copy-Item $_.FullName -Destination $BrokerDest -Force
              Copy-Item $_.FullName -Destination $OrchDest -Force
            }
          }
          Write-Host "Deployed to $GameHome"
          Get-ChildItem -Recurse -File "$GameHome\*.lua" | Measure-Object | ForEach-Object {
            Write-Host "  $($_.Count) .lua files in game directory"
          }
