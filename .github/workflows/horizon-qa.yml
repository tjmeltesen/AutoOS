name: Horizon-QA Integration Tests
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  horizon-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
      ORG_GRADLE_JVMARGS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Verify Java version
        run: java -version

      - name: Verify Gradle wrapper exists
        run: |
          test -f ./gradlew
          chmod +x ./gradlew

      - name: Accept Minecraft EULA
        run: |
          mkdir -p horizon-qa-tests/run/server
          echo "eula=true" > horizon-qa-tests/run/server/eula.txt

      - name: Run Horizon-QA tests
        run: |
          cd horizon-qa-tests && \
          ../gradlew :runServer \
            --no-daemon \
            --stacktrace \
            --mcJvmArgs="-Dhorizonqa.mode=ci" \
            --mcJvmArgs="-Dhorizonqa.reportDir=build/horizonqa"

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-qa-reports
          path: horizon-qa-tests/build/horizonqa/
          retention-days: 30
