name: Horizon-QA Integration Tests
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  horizon-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
      ORG_GRADLE_JVMARGS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          add-job-summary-as-pr-comment: false

      - name: Accept Minecraft EULA
        run: |
          mkdir -p horizon-qa-tests/run/server
          echo "eula=true" > horizon-qa-tests/run/server/eula.txt

      - name: Run Horizon-QA tests
        run: |
          chmod +x ./gradlew
          cd horizon-qa-tests && \
          ../gradlew :runServer \
            --no-daemon \
            --stacktrace \
            --mcJvmArgs="-Dhorizonqa.mode=ci" \
            --mcJvmArgs="-Dhorizonqa.reportDir=${{ github.workspace }}/horizon-qa-tests/build/horizonqa"

      - name: Collect all outputs
        if: always()
        run: |
          echo "=== build/horizonqa ==="
          find horizon-qa-tests/build/horizonqa -type f 2>/dev/null || echo "(empty)"
          echo "=== run/server test outputs ==="
          find horizon-qa-tests/run/server -maxdepth 1 \( -name "*.xml" -o -name "*.json" \) 2>/dev/null || echo "(empty)"
          echo "=== crash reports ==="
          find horizon-qa-tests/run/server/crash-reports -type f 2>/dev/null || echo "(none)"
          echo "=== latest.log (last 80 lines) ==="
          tail -80 horizon-qa-tests/run/server/logs/latest.log 2>/dev/null || echo "(no log)"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-qa-reports
          path: |
            horizon-qa-tests/build/horizonqa/**
            horizon-qa-tests/run/server/TEST-*.xml
            horizon-qa-tests/run/server/*-result.json
            horizon-qa-tests/run/server/crash-reports/**
            horizon-qa-tests/run/server/logs/latest.log
          retention-days: 30
