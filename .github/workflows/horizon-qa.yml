name: Horizon-QA Integration Tests
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  horizon-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - uses: gradle/actions/setup-gradle@v4
      - name: Verify Gradle wrapper exists
        run: test -x ./gradlew
      - name: Run Horizon-QA tests
        run: |
          ./gradlew :horizon-qa-tests:runServer \
            --no-daemon \
            --stacktrace \
            --mcJvmArgs="-Dhorizonqa.mode=ci -Dhorizonqa.reportDir=horizon-qa-tests/build/horizonqa"

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-qa-reports
          path: horizon-qa-tests/build/horizonqa/
          retention-days: 30
